services:
  - type: web
    name: free-fire-tools
    env: static
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /auth
        destination: /auth.html
      - type: rewrite
        source: /register
        destination: /register.html
      - type: rewrite
        source: /tools
        destination: /tools.html
      - type: rewrite
        source: /
        destination: /index.html
